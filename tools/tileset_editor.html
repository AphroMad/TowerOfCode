<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tileset Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #ccc; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #16213e; border-bottom: 1px solid #333; flex-shrink: 0; }
  .toolbar label { font-size: 13px; }
  .toolbar select, .toolbar button, .toolbar input[type=file] { font-family: monospace; font-size: 13px; background: #0f3460; color: #eee; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
  .toolbar button:hover { background: #1a5276; }
  .toolbar .sep { width: 1px; height: 24px; background: #444; }
  .toolbar .status { margin-left: auto; font-size: 13px; color: #888; }

  /* Main */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Canvas area */
  .canvas-wrap { flex: 1; overflow: auto; position: relative; background: #111; }
  .canvas-wrap canvas { display: block; image-rendering: pixelated; cursor: crosshair; }

  /* Preview */
  .preview-panel { width: 240px; background: #16213e; border-left: 1px solid #333; display: flex; flex-direction: column; }
  .preview-panel h3 { padding: 8px; font-size: 13px; color: #888; border-bottom: 1px solid #333; }
  .preview-content { flex: 1; overflow: auto; padding: 8px; display: flex; align-items: flex-start; justify-content: center; }
  .preview-content canvas { image-rendering: pixelated; }
</style>
</head>
<body>

<div class="toolbar">
  <input type="file" id="fileInput" accept="image/*">
  <div class="sep"></div>
  <label>Size: <select id="gridSize">
    <option value="8">8×8</option>
    <option value="16" selected>16×16</option>
    <option value="32">32×32</option>
    <option value="64">64×64</option>
  </select></label>
  <label>Zoom: <select id="zoom">
    <option value="1">1x</option>
    <option value="2" selected>2x</option>
    <option value="3">3x</option>
    <option value="4">4x</option>
  </select></label>
  <div class="sep"></div>
  <button id="btnExport">Export selected</button>
  <button id="btnExportSheet">Export as sheet</button>
  <button id="btnClear">Clear</button>
  <div class="status" id="status">Drop an image or use file picker</div>
</div>

<div class="main">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="tileset"></canvas>
  </div>
  <div class="preview-panel">
    <h3>Selection preview</h3>
    <div class="preview-content">
      <canvas id="preview"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const canvas = $('tileset');
const ctx = canvas.getContext('2d');
const prevCanvas = $('preview');
const prevCtx = prevCanvas.getContext('2d');
const wrap = $('canvasWrap');

const CELL = 8;  // Always 8px grid

let img = null;
let grid = 16;   // Selection size in pixels
let zoom = 2;
// Selected origins stored as "pixelY,pixelX" (snapped to 8px)
let selected = new Set();
let dragStart = null;
let dragging = false;
let dragCurrent = null;

// ── Load image ──────────────────────────────────────────────────

function loadImage(src) {
  const i = new Image();
  i.onload = () => { img = i; selected.clear(); render(); };
  i.src = src;
}

$('fileInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadImage(URL.createObjectURL(f));
});

document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(URL.createObjectURL(f));
});

$('gridSize').addEventListener('change', e => { grid = +e.target.value; selected.clear(); render(); updatePreview(); });
$('zoom').addEventListener('change', e => { zoom = +e.target.value; render(); });
$('btnClear').addEventListener('click', () => { selected.clear(); render(); updatePreview(); });

// ── Helpers ─────────────────────────────────────────────────────

// Convert mouse event to 8px cell coords, then snap to selection origin
function evtToOrigin(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const cellZoom = CELL * zoom;
  // Which 8px cell was clicked
  const cellC = Math.floor(x / cellZoom);
  const cellR = Math.floor(y / cellZoom);
  // Snap to 8px origin (pixel coords in source image)
  const px = cellC * CELL;
  const py = cellR * CELL;
  // Clamp so selection box stays in bounds
  const maxPx = img.width - grid;
  const maxPy = img.height - grid;
  return { px: Math.max(0, Math.min(px, maxPx)), py: Math.max(0, Math.min(py, maxPy)) };
}

function originKey(px, py) { return `${py},${px}`; }
function parseKey(k) { const [py, px] = k.split(',').map(Number); return { px, py }; }

// ── Render ──────────────────────────────────────────────────────

function render() {
  if (!img) return;
  const w = img.width * zoom;
  const h = img.height * zoom;
  canvas.width = w;
  canvas.height = h;

  // Checkerboard
  const cs = CELL * zoom;
  for (let y = 0; y < h; y += cs) {
    for (let x = 0; x < w; x += cs) {
      ctx.fillStyle = ((x / cs + y / cs) & 1) ? '#2a2a2a' : '#3a3a3a';
      ctx.fillRect(x, y, cs, cs);
    }
  }

  // Image
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, w, h);

  // 8px grid — always visible
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x <= w; x += cs) { ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, h); }
  for (let y = 0; y <= h; y += cs) { ctx.moveTo(0, y + 0.5); ctx.lineTo(w, y + 0.5); }
  ctx.stroke();

  // Selected tiles
  const gs = grid * zoom;
  ctx.strokeStyle = '#00ff00';
  ctx.lineWidth = 2;
  for (const key of selected) {
    const { px, py } = parseKey(key);
    ctx.strokeRect(px * zoom + 1, py * zoom + 1, gs - 2, gs - 2);
  }

  // Drag preview
  if (dragging && dragStart && dragCurrent) {
    // Highlight the rectangle of 8px cells being dragged over
    const x0 = Math.min(dragStart.px, dragCurrent.px);
    const y0 = Math.min(dragStart.py, dragCurrent.py);
    const x1 = Math.max(dragStart.px, dragCurrent.px) + grid;
    const y1 = Math.max(dragStart.py, dragCurrent.py) + grid;
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(x0 * zoom, y0 * zoom, (x1 - x0) * zoom, (y1 - y0) * zoom);
    ctx.setLineDash([]);
  }

  updateStatus();
}

// ── Mouse ───────────────────────────────────────────────────────

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0 || !img) return;
  dragStart = evtToOrigin(e);
  dragging = false;
  dragCurrent = null;
});

canvas.addEventListener('mousemove', e => {
  if (!dragStart || !img) return;
  dragging = true;
  dragCurrent = evtToOrigin(e);
  render();
});

canvas.addEventListener('mouseup', e => {
  if (!dragStart || !img) return;
  const end = evtToOrigin(e);

  if (!dragging) {
    // Single click — toggle one tile
    const key = originKey(dragStart.px, dragStart.py);
    if (selected.has(key)) selected.delete(key); else selected.add(key);
  } else {
    // Drag — lay non-overlapping tiles from drag start, stepping by grid size
    const x0 = Math.min(dragStart.px, end.px);
    const y0 = Math.min(dragStart.py, end.py);
    const x1 = Math.max(dragStart.px, end.px);
    const y1 = Math.max(dragStart.py, end.py);
    for (let py = y0; py <= y1; py += grid) {
      for (let px = x0; px <= x1; px += grid) {
        if (px + grid <= img.width && py + grid <= img.height) {
          selected.add(originKey(px, py));
        }
      }
    }
  }

  dragStart = null;
  dragging = false;
  dragCurrent = null;
  render();
  updatePreview();
});

// Right-click to deselect
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (!img) return;
  const o = evtToOrigin(e);
  selected.delete(originKey(o.px, o.py));
  render();
  updatePreview();
});

// ── Status ──────────────────────────────────────────────────────

function updateStatus() {
  $('status').textContent = img
    ? `${selected.size} tile${selected.size !== 1 ? 's' : ''} selected (${grid}×${grid}) — ${img.width}×${img.height}`
    : 'Drop an image or use file picker';
}

// ── Preview ─────────────────────────────────────────────────────

function updatePreview() {
  if (!selected.size) {
    prevCanvas.width = 0;
    prevCanvas.height = 0;
    return;
  }

  const tiles = [...selected].map(parseKey);

  // Just show each tile side by side
  const cols = Math.min(tiles.length, 6);
  const rows = Math.ceil(tiles.length / cols);
  const scale = Math.max(1, Math.min(6, Math.floor(220 / (cols * grid))));

  prevCanvas.width = cols * grid * scale;
  prevCanvas.height = rows * grid * scale;
  prevCtx.imageSmoothingEnabled = false;
  prevCtx.clearRect(0, 0, prevCanvas.width, prevCanvas.height);

  tiles.forEach(({ px, py }, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    prevCtx.drawImage(img,
      px, py, grid, grid,
      col * grid * scale, row * grid * scale, grid * scale, grid * scale
    );
  });
}

// ── Export ───────────────────────────────────────────────────────

$('btnExport').addEventListener('click', async () => {
  if (!selected.size) return alert('Nothing selected');
  const tiles = [...selected].map(parseKey).sort((a, b) => a.py - b.py || a.px - b.px);

  const zip = new JSZip();

  for (let i = 0; i < tiles.length; i++) {
    const { px, py } = tiles[i];
    const tmp = document.createElement('canvas');
    tmp.width = grid; tmp.height = grid;
    tmp.getContext('2d').drawImage(img, px, py, grid, grid, 0, 0, grid, grid);
    const blob = await new Promise(res => tmp.toBlob(res));
    zip.file(`tile_${String(i).padStart(4, '0')}_${px}_${py}.png`, blob);
  }

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = `tiles_${grid}x${grid}_${tiles.length}.zip`;
  a.click();
});

$('btnExportSheet').addEventListener('click', () => {
  if (!selected.size) return alert('Nothing selected');
  const tiles = [...selected].map(parseKey).sort((a, b) => a.py - b.py || a.px - b.px);

  const cols = Math.min(tiles.length, 8);
  const rows = Math.ceil(tiles.length / cols);
  const tmp = document.createElement('canvas');
  tmp.width = cols * grid;
  tmp.height = rows * grid;
  const tctx = tmp.getContext('2d');

  tiles.forEach(({ px, py }, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    tctx.drawImage(img, px, py, grid, grid, col * grid, row * grid, grid, grid);
  });

  tmp.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'selection_sheet.png';
    a.click();
  });
});
</script>
</body>
</html>
